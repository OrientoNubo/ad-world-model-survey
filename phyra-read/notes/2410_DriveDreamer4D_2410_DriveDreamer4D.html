  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      font-size: 14px;
    }
    .top-bar {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 500;
      color: var(--accent);
      background: var(--accent-soft);
      border: 1px solid transparent;
      border-radius: var(--radius);
      text-decoration: none;
      cursor: pointer;
      transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .back-btn:hover { border-color: var(--accent); }
    .top-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .theme-btn {
      margin-left: auto;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      background: var(--surface-alt);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .theme-btn:hover { background: var(--bg); color: var(--text); }
    .content {
      max-width: 860px;
      margin: 0 auto;
      padding: 32px 24px 64px;
    }
    .content h1 { font-size: 22px; font-weight: 800; margin: 32px 0 12px; letter-spacing: -0.4px; }
    .content h1:first-child { margin-top: 0; }
    .content h2 { font-size: 17px; font-weight: 700; margin: 28px 0 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border-light); }
    .content h3 { font-size: 14px; font-weight: 600; margin: 20px 0 8px; }
    .content h4 { font-size: 13px; font-weight: 600; margin: 16px 0 6px; color: var(--text-secondary); }
    .content p { margin: 8px 0; }
    .content a { color: var(--accent); text-decoration: none; }
    .content a:hover { text-decoration: underline; }
    .content blockquote {
      border-left: 3px solid var(--accent);
      padding: 8px 16px;
      margin: 12px 0;
      background: var(--accent-soft);
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      color: var(--text-secondary);
    }
    .content table { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 13px; }
    .content th, .content td { border: 1px solid var(--border); padding: 6px 12px; text-align: left; }
    .content th { background: var(--surface-alt); font-weight: 600; }
    .content code {
      background: var(--surface-alt);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'JetBrains Mono', 'SF Mono', monospace;
      font-size: 12px;
    }
    .content pre {
      background: var(--surface-alt);
      border: 1px solid var(--border-light);
      border-radius: var(--radius);
      padding: 14px;
      overflow-x: auto;
      margin: 12px 0;
    }
    .content pre code { background: none; padding: 0; }
    .content ul, .content ol { padding-left: 24px; margin: 8px 0; }
    .content li { margin: 4px 0; }
    .content img { max-width: 100%; border-radius: var(--radius); margin: 8px 0; }
    .content hr { border: none; border-top: 1px solid var(--border); margin: 24px 0; }
    .content strong { font-weight: 600; }
  </style>

  <script>
    // Theme
    const saved = localStorage.getItem('theme');
    if (saved === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    const themeBtn = document.getElementById('themeBtn');
    function updateLabel() { themeBtn.textContent = document.documentElement.getAttribute('data-theme') === 'dark' ? 'Light' : 'Dark'; }
    updateLabel();
    themeBtn.addEventListener('click', () => {
      const next = document.documentElement.getAttribute('data-theme') === 'dark' ? '' : 'dark';
      if (next) document.documentElement.setAttribute('data-theme', 'dark');
      else document.documentElement.removeAttribute('data-theme');
      localStorage.setItem('theme', next || 'light');
      updateLabel();
    });
    // Render MD
    const b64 = document.getElementById('md-source').textContent;
    const md = decodeURIComponent(escape(atob(b64)));
    document.getElementById('content').innerHTML = marked.parse(md);
  </script>
</body>
