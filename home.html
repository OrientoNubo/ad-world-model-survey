<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>AD World Model - Paper Reading Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }
    body {
      min-height: 100%;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* Header */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      height: 52px;
      background: var(--glass);
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 10px;
    }
    .header-title {
      font-weight: 800;
      font-size: 15px;
      white-space: nowrap;
      margin-right: 4px;
      letter-spacing: -0.3px;
      color: var(--accent);
    }
    .nav-link {
      padding: 5px 12px;
      border: 1px solid var(--border);
      border-radius: 5px;
      background: var(--surface);
      color: var(--text);
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
      text-decoration: none;
      letter-spacing: 0.2px;
    }
    .nav-link:hover { background: var(--surface-alt); border-color: var(--text-muted); }
    .nav-link.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .header-spacer { flex: 1; }

    /* Controls bar */
    .controls {
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .search-input {
      flex: 1;
      min-width: 200px;
      max-width: 400px;
      padding: 8px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      font-size: 13px;
      font-family: var(--font);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }
    .filter-btn {
      padding: 6px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
      font-family: var(--font);
    }
    .filter-btn:hover { background: var(--surface-alt); color: var(--text); }
    .filter-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .sort-select {
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      color: var(--text);
      font-size: 12px;
      font-family: var(--font);
      cursor: pointer;
      outline: none;
    }
    .result-count {
      font-size: 12px;
      color: var(--text-muted);
      margin-left: auto;
    }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
      padding: 0 24px 48px;
    }

    /* Card */
    .paper-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: box-shadow 0.15s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.15s;
    }
    .paper-card:hover {
      box-shadow: var(--shadow-hover);
      border-color: var(--text-muted);
    }
    .card-top {
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }
    .card-name {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.3px;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 99px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.3px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .badge-year {
      background: var(--accent-soft);
      color: var(--accent);
    }
    .badge-venue {
      background: var(--surface-alt);
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }
    .card-title {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: auto;
    }
    .rating {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
    }
    .rating-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
    }
    .card-actions {
      display: flex;
      gap: 6px;
      margin-left: auto;
    }
    .action-btn {
      padding: 5px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      color: var(--text);
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
      font-family: var(--font);
    }
    .action-btn:hover {
      background: var(--accent-soft);
      color: var(--accent);
      border-color: var(--accent);
    }
    .action-btn.disabled {
      opacity: 0.35;
      pointer-events: none;
    }

    /* No results */
    .no-results {
      grid-column: 1 / -1;
      text-align: center;
      padding: 48px 0;
      color: var(--text-muted);
      font-size: 14px;
    }

    @media (max-width: 640px) {
      .grid { grid-template-columns: 1fr; padding: 0 12px 48px; }
      .controls { padding: 12px; }
    }
  </style>
</head>
<body>

<div class="header">
  <span class="header-title">AD World Model</span>
  <a class="nav-link active" href="home.html">Home</a>
  <a class="nav-link" href="index.html">Whiteboard</a>
  <div class="header-spacer"></div>
  <button class="nav-link" id="themeBtn">Dark</button>
</div>

<div class="controls">
  <input type="text" class="search-input" id="searchBox" placeholder="Search papers by name, title, or keyword...">
  <div id="yearFilters"></div>
  <select class="sort-select" id="sortSelect">
    <option value="year-desc">Newest first</option>
    <option value="year-asc">Oldest first</option>
    <option value="rating-desc">Highest rated</option>
    <option value="name-asc">A-Z</option>
  </select>
  <span class="result-count" id="resultCount"></span>
</div>

<div class="grid" id="paperGrid"></div>

<script>
(async function() {
  // Theme
  const saved = localStorage.getItem('theme');
  if (saved === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
  const themeBtn = document.getElementById('themeBtn');
  function updateThemeLabel() { themeBtn.textContent = document.documentElement.getAttribute('data-theme') === 'dark' ? 'Light' : 'Dark'; }
  updateThemeLabel();
  themeBtn.addEventListener('click', () => {
    const next = document.documentElement.getAttribute('data-theme') === 'dark' ? '' : 'dark';
    if (next) document.documentElement.setAttribute('data-theme', 'dark');
    else document.documentElement.removeAttribute('data-theme');
    localStorage.setItem('theme', next || 'light');
    updateThemeLabel();
  });

  // Load papers
  const resp = await fetch('data/papers.json?v=' + Date.now());
  const papers = await resp.json();

  // Collect years
  const years = [...new Set(papers.map(p => p.year))].sort();
  const yearFiltersEl = document.getElementById('yearFilters');
  let activeYear = null;

  function renderYearFilters() {
    yearFiltersEl.innerHTML = years.map(y =>
      `<button class="filter-btn ${activeYear === y ? 'active' : ''}" data-year="${y}">${y}</button>`
    ).join(' ');
    yearFiltersEl.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        activeYear = activeYear === btn.dataset.year ? null : btn.dataset.year;
        renderYearFilters();
        renderGrid();
      });
    });
  }
  renderYearFilters();

  const searchBox = document.getElementById('searchBox');
  const sortSelect = document.getElementById('sortSelect');
  const grid = document.getElementById('paperGrid');
  const resultCount = document.getElementById('resultCount');

  searchBox.addEventListener('input', renderGrid);
  sortSelect.addEventListener('change', renderGrid);

  function renderGrid() {
    const q = searchBox.value.toLowerCase().trim();
    let filtered = papers.filter(p => {
      if (activeYear && p.year !== activeYear) return false;
      if (q) {
        const haystack = `${p.short_name} ${p.title} ${(p.keywords||[]).join(' ')}`.toLowerCase();
        return haystack.includes(q);
      }
      return true;
    });

    // Sort
    const sort = sortSelect.value;
    filtered.sort((a, b) => {
      if (sort === 'year-desc') return b.year.localeCompare(a.year) || a.short_name.localeCompare(b.short_name);
      if (sort === 'year-asc') return a.year.localeCompare(b.year) || a.short_name.localeCompare(b.short_name);
      if (sort === 'rating-desc') return (b.ratings?.overall || 0) - (a.ratings?.overall || 0);
      if (sort === 'name-asc') return a.short_name.localeCompare(b.short_name);
      return 0;
    });

    resultCount.textContent = `${filtered.length} of ${papers.length} papers`;

    if (filtered.length === 0) {
      grid.innerHTML = '<div class="no-results">No papers found.</div>';
      return;
    }

    grid.innerHTML = filtered.map(p => {
      const rating = p.ratings?.overall || '?';
      const slidesClass = p.phyra_slides ? '' : 'disabled';
      const notesClass = p.phyra_notes ? '' : 'disabled';
      const slidesHref = p.phyra_slides || '#';
      const notesHref = p.phyra_notes || '#';
      const venue = p.venue || '';
      return `
        <div class="paper-card">
          <div class="card-top">
            <span class="card-name">${esc(p.short_name)}</span>
            <span class="badge badge-year">${esc(p.year)}</span>
            ${venue ? `<span class="badge badge-venue">${esc(venue)}</span>` : ''}
          </div>
          <div class="card-title">${esc(p.title)}</div>
          <div class="card-meta">
            <span class="rating"><span class="rating-dot"></span>${rating}/5</span>
            <div class="card-actions">
              <a class="action-btn ${slidesClass}" href="${slidesHref}" target="_blank">Slides</a>
              <a class="action-btn ${notesClass}" href="${notesHref}" target="_blank">Notes</a>
            </div>
          </div>
        </div>`;
    }).join('');
  }

  function esc(s) {
    if (!s) return '';
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  renderGrid();
})();
</script>
</body>
</html>
